name: Weekly Dispo Sync

on:
  schedule:
    - cron: '0 3 * * 1'  # Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  sync-dispo:
    name: Sync Availability Data
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bdpm-${{ runner.os }}"
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release

      - name: Sync availability data
        run: ./target/release/bdpm-ingest dispo --data-dir data
