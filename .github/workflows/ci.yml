name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - "1.80"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bdpm-${{ runner.os }}"
          cache-on-failure: true
      - name: Build
        run: cargo build
      - name: Run clippy
        run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - "1.80"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bdpm-${{ runner.os }}"
          cache-on-failure: true
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test
      - name: Run integration tests
        run: cargo test --test integration
      - name: Verify committed OpenAPI spec is up to date
        run: |
          ./target/release/bdpm-ingest dump-open-api > /tmp/generated_openapi.yaml
          diff /tmp/generated_openapi.yaml openapi.yaml || (echo "ERROR: openapi.yaml is out of date. Run 'bdpm-ingest dump-open-api > openapi.yaml' and commit." && exit 1)

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bdpm-${{ runner.os }}"
          cache-on-failure: true
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit
        run: cargo audit

  validate-openapi:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bdpm-${{ runner.os }}"
      - name: Build release binary
        run: cargo build --release
      - name: Generate OpenAPI spec
        run: ./target/release/bdpm-ingest dump-open-api > openapi_generated.yaml
      - name: Validate OpenAPI spec
        run: |
          pip install openapi-spec-validator
          python3 -c "
          from openapi_spec_validator import validate_spec
          import yaml
          with open('openapi_generated.yaml') as f:
              spec = yaml.safe_load(f)
          validate_spec(spec)
          print('OpenAPI spec is valid:', spec.get('openapi'))
          "