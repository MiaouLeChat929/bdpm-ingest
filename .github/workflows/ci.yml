name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - "1.80"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - name: Install libclang-dev
        run: sudo apt-get update && sudo apt-get install -y libclang-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bdpm-${{ runner.os }}"
          cache-on-failure: true
      - name: Build
        run: cargo build
      - name: Run clippy
        run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - "1.80"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Install libclang-dev
        run: sudo apt-get update && sudo apt-get install -y libclang-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bdpm-${{ runner.os }}"
          cache-on-failure: true
      - name: Build
        run: cargo build
      - name: Run unit tests
        run: cargo test --lib
      - name: Run integration tests
        run: cargo test --test integration
      - name: Run server integration tests
        run: cargo test --test server_integration
      - name: Verify committed OpenAPI spec is up to date
        run: |
          cargo run --release -- dump-open-api > /tmp/generated_openapi.yaml
          diff /tmp/generated_openapi.yaml src/api/openapi.yaml || (echo "ERROR: openapi.yaml is out of date. Run 'cargo run --release -- dump-open-api > src/api/openapi.yaml' and commit." && exit 1)

  bench-compile:
    name: Benchmark Compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install libclang-dev
        run: sudo apt-get update && sudo apt-get install -y libclang-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bdpm-${{ runner.os }}"
          cache-on-failure: true
      - name: Verify benchmarks compile
        run: cargo bench --no-run

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bdpm-${{ runner.os }}"
          cache-on-failure: true
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit
        run: cargo audit